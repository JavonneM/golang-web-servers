version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5000:5432"
    healthcheck:
      test: echo data ok || exit 1
      interval: 2s
      timeout: 5s
      retries: 3
    volumes:
      - ../../../database:/var/lib/postgresql/data # Persist data
